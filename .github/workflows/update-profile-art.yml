name: Update profile art

on:
  schedule:
    - cron: "17 2 * * *" # daily, off the top-of-hour rush
  workflow_dispatch: {} # run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Re-scrape contributions and re-render the graph
        env:
          GH_PROFILE_USER: dpnsu
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph"
          git push
